<div class="pt-3 todo-app">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h1 class="text-center mb-5">Todo App</h1>
            <div class="input-group mb-3">
                <input type="text" [value]="newTodoText()" (input)="newTodoText.set($event.target.value)"
                    placeholder="Új todo" class="form-control">
                <button (click)="addTodo()" class="btn btn-success btn-sm">Hozzáad</button>
            </div>
            <div *ngFor="let todo of todos()" class="todo-item d-flex align-items-center mb-3 p-3"
                [ngClass]="{'completed': todo.completed}">
                <div class="flex-grow-1 me-3">
                    <div class="todo-text">{{todo.text}}</div>
                    <small class="text-muted todo-date">{{todo.created | date:'yyyy.MM.dd HH:mm'}}</small>
                </div>
                <button (click)="toggleComplete(todo.id)"
                    [ngClass]="todo.completed ? 'btn btn-success btn-sm me-1' : 'btn btn-warning btn-sm me-1'">✓</button>
                <button (click)="deleteTodo(todo.id)" class="btn btn-danger btn-sm">🗑️</button>
            </div>

        </div>
    </div>
</div>
